apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: artifact-registry
  namespace: artifact-registry
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: artifact-registry
  minReplicas: 6
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
