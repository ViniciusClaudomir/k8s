apiVersion: v1
kind: ServiceAccount
metadata:
  name: artifact-registry
  namespace: artifact-registry
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: submit
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: artifact-registry-pod-reader
  namespace: submit
subjects:
  - kind: ServiceAccount
    name: artifact-registry
    namespace: artifact-registry
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
