apiVersion: apps/v1
kind: Deployment
metadata:
  name: manager
  namespace: manager
  labels:
    app: manager
spec:
  selector:
    matchLabels:
      app: manager
  template:
    metadata:
      labels:
        app: manager
    spec:
      containers:
        - name: manager
          image: manager:v04
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: EXECUTOR_URL
              value: "http://submit.submit.svc.cluster.local"
            - name: SUBMIT_URL
              value: "http://submit.submit.svc.cluster.local"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
