apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: manager
  namespace: manager
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: manager
  minReplicas: 0
  maxReplicas: 0
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 99
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 99
