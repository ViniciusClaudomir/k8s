apiVersion: v1
kind: ServiceAccount
metadata:
  name: manager
  namespace: manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: manager-knative
  namespace: submit
rules:
  - apiGroups: ["serving.knative.dev"]
    resources: ["services"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: manager-knative
  namespace: submit
subjects:
  - kind: ServiceAccount
    name: manager
    namespace: manager
roleRef:
  kind: Role
  name: manager-knative
  apiGroup: rbac.authorization.k8s.io
