apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: redis-ha
  labels:
    app: redis
    role: master
spec:
  # Headless: necessário para o StatefulSet ter resolução DNS por pod
  # Ex: redis-master-0.redis-master.redis-ha.svc.cluster.local
  clusterIP: None
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: redis
    role: master
