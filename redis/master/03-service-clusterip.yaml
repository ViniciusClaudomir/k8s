apiVersion: v1
kind: Service
metadata:
  name: redis-master-svc
  namespace: artifact-registry
  labels:
    app: redis
    role: master
spec:
  # ClusterIP: ponto de acesso estável para clientes internos (escrita)
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: redis
    role: master
