apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-replica-config
  namespace: artifact-registry
data:
  redis.conf: |
    bind 0.0.0.0
    port 6379
    requirepass redis@HA2024
    masterauth redis@HA2024
    replicaof redis-master-0.redis-master.artifact-registry.svc.cluster.local 6379
    replica-read-only yes
    appendonly yes
    appendfsync everysec
    loglevel notice
    protected-mode no
    save 900 1
    save 300 10
    save 60 10000
