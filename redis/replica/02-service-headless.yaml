apiVersion: v1
kind: Service
metadata:
  name: redis-replica
  namespace: artifact-registry
  labels:
    app: redis
    role: replica
spec:
  # Headless: necessário para resolução DNS por pod do StatefulSet
  # Ex: redis-replica-0.redis-replica.artifact-registry.svc.cluster.local
  clusterIP: None
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: redis
    role: replica
