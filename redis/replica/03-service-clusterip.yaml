apiVersion: v1
kind: Service
metadata:
  name: redis-replica-svc
  namespace: artifact-registry
  labels:
    app: redis
    role: replica
spec:
  # ClusterIP: ponto de acesso estável para clientes internos (leitura)
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: redis
    role: replica
